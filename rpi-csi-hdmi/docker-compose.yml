# TC358743 HDMI-to-CSI capture stack for Raspberry Pi 3/4
#
# Start core services:
#   docker compose up -d
#
# Start with local HDMI preview (requires a display):
#   docker compose --profile preview up -d
#
# Prerequisites on the host:
#   - dtoverlay=tc358743,4lane=1 in /boot/firmware/config.txt
#   - user running docker must be in the 'video' group, or run with sudo

services:

  # Oneshot: programs the TC358743 EDID over V4L2 before capture starts.
  # Re-run manually if needed: docker compose up --force-recreate edid-setup
  edid-setup:
    build:
      context: ./edid-setup
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./edid-setup:/opt/edid:ro
    command:
      - v4l2-ctl
      - --set-edid=file=/opt/edid/tc358743_gopro_1080p24_30_no_1080p60_edid_hex.txt
    restart: "no"

  ustreamer:
    build:
      context: ./ustreamer
    depends_on:
      edid-setup:
        condition: service_completed_successfully
    # privileged is required so the m2m-image encoder can scan and open
    # bcm2835-codec V4L2 M2M nodes (/dev/video10–18, /dev/video31, etc.).
    # Exact device numbers vary by kernel/firmware — privileged avoids
    # having to enumerate them manually.
    privileged: true
    ports:
      - "8080:8080"
    restart: always
    command:
      - --dv-timings
      - --device=/dev/video0
      - --format=uyvy
      - --host=0.0.0.0
      # m2m-image uses bcm2835-codec HW JPEG encoder. Safe to use here because
      # the gstreamer preview service uses software jpegdec, not v4l2jpegdec,
      # so there is no codec contention between the two services.
      - --encoder=m2m-image
      - --workers=3
      - --buffers=4
      - --persistent


  # Optional local preview — only started with: docker compose --profile preview up
  # GStreamer pipeline: souphttpsrc → multipartdemux → jpegdec → fbdevsink
  # fbdevsink writes directly to /dev/fb0 — no DRM plane ownership needed,
  # works reliably from inside a container without fighting fbcon.
  gstreamer:
    profiles:
      - preview
    build:
      context: ./gstreamer
    depends_on:
      - ustreamer
    devices:
      - /dev/fb0:/dev/fb0
    restart: on-failure
